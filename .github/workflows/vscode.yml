name: VSCode

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  vscode:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run compile

      - name: Integration test (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libgbm1 libnss3 xvfb
          xvfb-run -a npm test

      - name: Package VSIX
        run: npx vsce package --allow-missing-repository --out nuxmv-vscode.vsix
