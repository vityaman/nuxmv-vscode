name: VSIX

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag for the release (e.g. v0.0.1). Leave empty to use v{version} from package.json.
        required: false
        type: string
      prerelease:
        description: Mark as prerelease
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Resolve version and tag
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Package VSIX
        run: npx vsce package --allow-missing-repository --out "nuxmv-vscode-${{ steps.meta.outputs.version }}.vsix" --follow-symlinks

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: nuxmv-vscode-${{ steps.meta.outputs.version }}.vsix
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
